name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  integration:
    runs-on: ubuntu-latest
    needs: lint-and-unit

    services:
      surrealdb:
        image: surrealdb/surrealdb:v2.6.1
        ports:
          - 8000:8000
        command: >-
          start --log info --unauthenticated memory

    env:
      SURREALDB_URL: ws://127.0.0.1:8000/rpc
      SURREALDB_NS: test
      SURREALDB_DB: test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Integration tests
        run: npm run test:integration

  integration-auth:
    runs-on: ubuntu-latest
    needs: lint-and-unit

    services:
      surrealdb:
        image: surrealdb/surrealdb:v2.6.1
        ports:
          - 8000:8000
        command: >-
          start --log info --user root --pass root memory

    env:
      SURREALDB_AUTH_URL: ws://127.0.0.1:8000/rpc
      SURREALDB_AUTH_NS: test
      SURREALDB_AUTH_DB: test
      SURREALDB_AUTH_USER: root
      SURREALDB_AUTH_PASS: root

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Auth integration tests
        run: npm run test:integration:auth

  integration-resilience:
    runs-on: ubuntu-latest
    needs: lint-and-unit

    services:
      surrealdb:
        image: surrealdb/surrealdb:v2.6.1
        ports:
          - 8000:8000
        command: >-
          start --log info --unauthenticated memory
      surrealdb-auth:
        image: surrealdb/surrealdb:v2.6.1
        ports:
          - 8001:8000
        command: >-
          start --log info --user root --pass root memory

    env:
      SURREALDB_URL: ws://127.0.0.1:8000/rpc
      SURREALDB_NS: test
      SURREALDB_DB: test
      SURREALDB_AUTH_URL: ws://127.0.0.1:8001/rpc
      SURREALDB_AUTH_NS: test
      SURREALDB_AUTH_DB: test
      SURREALDB_AUTH_USER: root
      SURREALDB_AUTH_PASS: root

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Resilience integration tests
        run: npm run test:integration:resilience
