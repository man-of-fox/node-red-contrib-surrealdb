<script type="text/javascript">
  RED.nodes.registerType("surrealdb-config", {
    category: "config",
    defaults: {
      name: { value: "" },
      url: { value: "ws://127.0.0.1:8000", required: true },
      namespace: { value: "test", required: true },
      database: { value: "test", required: true },
      authType: { value: "credentials", required: true },
      username: { value: "" },
      minConnections: { value: 1, required: true, validate: RED.validators.number() },
      maxConnections: { value: 5, required: true, validate: RED.validators.number() },
      healthCheckIntervalMs: { value: 30000, required: true, validate: RED.validators.number() },
      retryAttempts: { value: 5, required: true, validate: RED.validators.number() },
      retryDelayMs: { value: 1000, required: true, validate: RED.validators.number() },
      validateConnection: { value: true },
      tokenRefreshSkewSec: { value: 60, required: true, validate: RED.validators.number() }
    },
    credentials: {
      password: { type: "password" },
      token: { type: "password" }
    },
    label: function () {
      return this.name || this.url || "surrealdb-config";
    }
  });
</script>

<script type="text/html" data-template-name="surrealdb-config">
  <div class="form-row">
    <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-config-input-name" />
  </div>
  <div class="form-row">
    <label for="node-config-input-url"><i class="fa fa-globe"></i> URL</label>
    <input type="text" id="node-config-input-url" />
  </div>
  <div class="form-row">
    <label for="node-config-input-namespace">Namespace</label>
    <input type="text" id="node-config-input-namespace" />
  </div>
  <div class="form-row">
    <label for="node-config-input-database">Database</label>
    <input type="text" id="node-config-input-database" />
  </div>
  <div class="form-row">
    <label for="node-config-input-authType">Auth Type</label>
    <select id="node-config-input-authType">
      <option value="credentials">Credentials</option>
      <option value="token">Token</option>
    </select>
  </div>
  <div class="form-row">
    <label for="node-config-input-username">Username</label>
    <input type="text" id="node-config-input-username" />
  </div>
  <div class="form-row">
    <label for="node-config-input-password">Password</label>
    <input type="password" id="node-config-input-password" />
  </div>
  <div class="form-row">
    <label for="node-config-input-token">Token</label>
    <input type="password" id="node-config-input-token" />
  </div>
  <div class="form-row">
    <label for="node-config-input-minConnections">Min Connections</label>
    <input type="number" id="node-config-input-minConnections" />
  </div>
  <div class="form-row">
    <label for="node-config-input-maxConnections">Max Connections</label>
    <input type="number" id="node-config-input-maxConnections" />
  </div>
  <div class="form-row">
    <label for="node-config-input-healthCheckIntervalMs">Health Check (ms)</label>
    <input type="number" id="node-config-input-healthCheckIntervalMs" />
  </div>
  <div class="form-row">
    <label for="node-config-input-retryAttempts">Retry Attempts</label>
    <input type="number" id="node-config-input-retryAttempts" />
  </div>
  <div class="form-row">
    <label for="node-config-input-retryDelayMs">Retry Delay (ms)</label>
    <input type="number" id="node-config-input-retryDelayMs" />
  </div>
  <div class="form-row">
    <label for="node-config-input-validateConnection">Validate Connection</label>
    <input type="checkbox" id="node-config-input-validateConnection" style="width:auto;" />
  </div>
  <div class="form-row">
    <label for="node-config-input-tokenRefreshSkewSec">Token Refresh Skew (sec)</label>
    <input type="number" id="node-config-input-tokenRefreshSkewSec" />
  </div>
</script>

<script type="text/html" data-help-name="surrealdb-config">
  <p>Shared SurrealDB connection settings including auth, retry and pool behavior.</p>
</script>
