<script type="text/javascript">
  RED.nodes.registerType("surrealdb-config", {
    category: "config",
    defaults: {
      name: { value: "" },
      url: { value: "ws://127.0.0.1:8000", required: true },
      namespace: { value: "test", required: true },
      database: { value: "test", required: true },
      authType: { value: "credentials", required: true },
      username: { value: "" },
      minConnections: { value: 1, required: true, validate: RED.validators.number() },
      maxConnections: { value: 5, required: true, validate: RED.validators.number() },
      healthCheckIntervalMs: { value: 30000, required: true, validate: RED.validators.number() },
      healthCheckTimeoutMs: { value: 2000, required: true, validate: RED.validators.number() },
      retryAttempts: { value: 5, required: true, validate: RED.validators.number() },
      retryDelayMs: { value: 1000, required: true, validate: RED.validators.number() },
      acquireTimeoutMs: { value: 30000, required: true, validate: RED.validators.number() },
      operationTimeoutMs: { value: 30000, required: true, validate: RED.validators.number() },
      validateConnection: { value: true },
      tokenRefreshSkewSec: { value: 60, required: true, validate: RED.validators.number() }
    },
    credentials: {
      password: { type: "password" },
      token: { type: "password" }
    },
    label: function () {
      return this.name || this.url || "surrealdb-config";
    }
  });
</script>

<script type="text/html" data-help-name="surrealdb-config">
  <p>Gemeinsame SurrealDB-Verbindung für alle SurrealDB-Nodes.</p>
  <h3>Wichtige Felder</h3>
  <ul>
    <li><code>url</code>: WebSocket-Endpoint, z. B. <code>ws://surrealdb:8000</code></li>
    <li><code>namespace</code> und <code>database</code></li>
    <li><code>authType</code>: <code>credentials</code> oder <code>token</code></li>
    <li>Pool: <code>minConnections</code>, <code>maxConnections</code></li>
    <li>Resilience: <code>healthCheckIntervalMs</code>, <code>healthCheckTimeoutMs</code>, <code>retryAttempts</code>, <code>retryDelayMs</code></li>
    <li>Timeouts: <code>acquireTimeoutMs</code>, <code>operationTimeoutMs</code></li>
    <li>Token-Handling: <code>tokenRefreshSkewSec</code></li>
  </ul>
  <h3>Timeouts und empfohlene Bereiche</h3>
  <ul>
    <li>
      <code>retryDelayMs</code>: Verzögerung zwischen Reconnect-Versuchen.
      Typisch: <code>500 - 3000</code> ms, Startwert: <code>1000</code> ms.
    </li>
    <li>
      <code>healthCheckIntervalMs</code>: Intervall für Verbindungsprüfung.
      Typisch: <code>5000 - 60000</code> ms, Startwert: <code>10000</code> ms.
    </li>
    <li>
      <code>healthCheckTimeoutMs</code>: Maximale Dauer für Ping/Health-Check.
      Typisch: <code>1000 - 5000</code> ms, Startwert: <code>2000</code> ms.
    </li>
    <li>
      <code>acquireTimeoutMs</code>: Maximale Wartezeit auf freien Pool-Client.
      Typisch: <code>5000 - 30000</code> ms, Startwert: <code>10000</code> ms.
    </li>
    <li>
      <code>operationTimeoutMs</code>: Maximale Dauer für einzelne DB-Operationen.
      Typisch: <code>10000 - 120000</code> ms, Startwert: <code>30000</code> ms.
    </li>
  </ul>
  <h3>Hinweis</h3>
  <p>
    Für lokale Tests ohne Auth in SurrealDB können <code>username</code>, <code>password</code> und
    <code>token</code> leer bleiben.
  </p>

    <a href="https://surrealdb.com/docs/sdk/javascript" target="_blank">SurrealDB JS SDK: Overview</a>
  </p>
</script>
