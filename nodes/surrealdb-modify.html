<script type="text/javascript">
  RED.nodes.registerType("surrealdb-modify", {
    category: "SurrealDB",
    color: "#d8f3dc",
    defaults: {
      name: { value: "" },
      connection: { value: "", type: "surrealdb-config", required: true },
      table: { value: "" },
      recordId: { value: "" },
      mode: { value: "merge", required: true }
    },
    inputs: 1,
    outputs: 1,
    icon: "db.svg",
    label: function () {
      return this.name || "surrealdb modify";
    }
  });
</script>

<script type="text/html" data-template-name="surrealdb-modify">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" />
  </div>
  <div class="form-row">
    <label for="node-input-connection">Connection</label>
    <input type="text" id="node-input-connection" />
  </div>
  <div class="form-row">
    <label for="node-input-table">Table</label>
    <input type="text" id="node-input-table" />
  </div>
  <div class="form-row">
    <label for="node-input-recordId">Record ID (optional)</label>
    <input type="text" id="node-input-recordId" />
  </div>
  <div class="form-row">
    <label for="node-input-mode">Mode</label>
    <select id="node-input-mode">
      <option value="merge">merge</option>
      <option value="update">update</option>
      <option value="patch">patch</option>
    </select>
  </div>
</script>

<script type="text/html" data-help-name="surrealdb-modify">
  <p>Ändert bestehende Datensätze per <code>merge</code>, <code>update</code> oder <code>patch</code>.</p>
  <h3>Inputs</h3>
  <ul>
    <li><code>msg.payload</code>: Änderungsdaten</li>
    <li><code>msg.mode</code> (optional): überschreibt Node-Mode</li>
    <li><code>msg.table</code>, <code>msg.recordId</code>/<code>msg.id</code> (optional)</li>
  </ul>
  <h3>Modi</h3>
  <ul>
    <li><code>merge</code>: partielle Zusammenführung</li>
    <li><code>update</code>: ersetzt den Record-Inhalt</li>
    <li><code>patch</code>: JSON-Patch-Operationen; benötigt Record-ID</li>
  </ul>
  <h3>Beispiel (patch)</h3>
  <pre>{
  "table": "person",
  "recordId": "tobie",
  "mode": "patch",
  "payload": [
    { "op": "replace", "path": "/mail", "value": "new@example.com" }
  ]
}</pre>
  <h3>Original-Doku</h3>
  <p>
    <a href="https://surrealdb.com/docs/sdk/javascript/methods/merge" target="_blank">JS SDK: merge()</a><br />
    <a href="https://surrealdb.com/docs/sdk/javascript/methods/update" target="_blank">JS SDK: update()</a><br />
    <a href="https://surrealdb.com/docs/sdk/javascript/methods/patch" target="_blank">JS SDK: patch()</a><br />
    <a href="https://surrealdb.com/docs/surrealql/statements/update" target="_blank">SurrealQL: UPDATE</a>
  </p>
</script>
