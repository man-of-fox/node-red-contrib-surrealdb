<script type="text/javascript">
  RED.nodes.registerType("surrealdb-relate", {
    category: "SurrealDB",
    color: "#d8f3dc",
    defaults: {
      name: { value: "" },
      connection: { value: "", type: "surrealdb-config", required: true },
      from: { value: "" },
      relation: { value: "", required: true },
      to: { value: "" }
    },
    inputs: 1,
    outputs: 1,
    icon: "db.svg",
    label: function () {
      return this.name || "surrealdb relate";
    }
  });
</script>

<script type="text/html" data-template-name="surrealdb-relate">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" />
  </div>
  <div class="form-row">
    <label for="node-input-connection">Connection</label>
    <input type="text" id="node-input-connection" />
  </div>
  <div class="form-row">
    <label for="node-input-from">From</label>
    <input type="text" id="node-input-from" placeholder="table:id" />
  </div>
  <div class="form-row">
    <label for="node-input-relation">Relation</label>
    <input type="text" id="node-input-relation" placeholder="likes" />
  </div>
  <div class="form-row">
    <label for="node-input-to">To</label>
    <input type="text" id="node-input-to" placeholder="table:id" />
  </div>
</script>

<script type="text/html" data-help-name="surrealdb-relate">
  <p>Erstellt Graph-Kanten mit <code>from -&gt; relation -&gt; to</code>.</p>
  <h3>Inputs</h3>
  <ul>
    <li><code>msg.from</code> (optional): z. B. <code>person:alice</code></li>
    <li><code>msg.relation</code> (optional): z. B. <code>likes</code></li>
    <li><code>msg.to</code> (optional): z. B. <code>movie:matrix</code></li>
    <li><code>msg.payload</code>: optionale Kanten-Daten</li>
  </ul>
  <h3>Hinweis</h3>
  <p>Node-Felder können durch <code>msg.from</code>, <code>msg.relation</code> und <code>msg.to</code> überschrieben werden.</p>
  <h3>Beispiel</h3>
  <pre>{
  "from": "person:alice",
  "relation": "likes",
  "to": "movie:matrix",
  "payload": { "rating": 9 }
}</pre>
  <h3>Original-Doku</h3>
  <p>
    <a href="https://surrealdb.com/docs/surrealql/statements/relate" target="_blank">SurrealQL: RELATE</a><br />
    <a href="https://surrealdb.com/docs/sdk/javascript" target="_blank">JS SDK: Overview</a>
  </p>
</script>
