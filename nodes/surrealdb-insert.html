<script type="text/javascript">
  RED.nodes.registerType("surrealdb-insert", {
    category: "SurrealDB",
    color: "#d8f3dc",
    defaults: {
      name: { value: "" },
      connection: { value: "", type: "surrealdb-config", required: true },
      table: { value: "", required: true },
      mode: { value: "insert", required: true }
    },
    inputs: 1,
    outputs: 1,
    icon: "db.svg",
    label: function () {
      return this.name || "surrealdb insert";
    }
  });
</script>

<script type="text/html" data-template-name="surrealdb-insert">

    <label for="node-input-connection">Connection</label>

</script>

<script type="text/html" data-help-name="surrealdb-insert">
