<script type="text/javascript">
  RED.nodes.registerType("surrealdb-select", {
    category: "SurrealDB",
    color: "#d8f3dc",
    defaults: {
      name: { value: "" },
      connection: { value: "", type: "surrealdb-config", required: true },
      table: { value: "" },
      recordId: { value: "" }
    },
    inputs: 1,
    outputs: 1,
    icon: "db.svg",
    label: function () {
      return this.name || "surrealdb select";
    }
  });
</script>

<script type="text/html" data-template-name="surrealdb-select">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" />
  </div>
  <div class="form-row">
    <label for="node-input-connection">Connection</label>
    <input type="text" id="node-input-connection" />
  </div>
  <div class="form-row">
    <label for="node-input-table">Table</label>
    <input type="text" id="node-input-table" />
  </div>
  <div class="form-row">
    <label for="node-input-recordId">Record ID (optional)</label>
    <input type="text" id="node-input-recordId" />
  </div>
</script>

<script type="text/html" data-help-name="surrealdb-select">
  <p>Liest Records einer Tabelle oder genau einen Record per ID.</p>
  <h3>Inputs</h3>
  <ul>
    <li><code>msg.table</code> (optional)</li>
    <li><code>msg.recordId</code> oder <code>msg.id</code> (optional)</li>
  </ul>
  <h3>Verhalten</h3>
  <ul>
    <li>Nur <code>table</code>: liefert Tabelle als Liste</li>
    <li><code>table + recordId</code> oder volle Record-ID: liefert einzelnen Record</li>
  </ul>
  <h3>Beispiel</h3>
  <pre>{
  "table": "person",
  "recordId": "tobie"
}</pre>
  <h3>Original-Doku</h3>
  <p>
    <a href="https://surrealdb.com/docs/sdk/javascript/methods/select" target="_blank">JS SDK: select()</a><br />
    <a href="https://surrealdb.com/docs/surrealql/statements/select" target="_blank">SurrealQL: SELECT</a>
  </p>
</script>
