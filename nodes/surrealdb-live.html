<script type="text/javascript">
  RED.nodes.registerType("surrealdb-live", {
    category: "SurrealDB",
    color: "#d8f3dc",
    defaults: {
      name: { value: "" },
      connection: { value: "", type: "surrealdb-config", required: true },
      table: { value: "", required: true }
    },
    inputs: 1,
    outputs: 1,
    icon: "db.svg",
    label: function () {
      return this.name || "surrealdb live";
    }
  });
</script>

<script type="text/html" data-template-name="surrealdb-live">

    <label for="node-input-connection">Connection</label>

  </div>
  <div class="form-row">
    <label for="node-input-table">Table</label>

  </div>
</script>
